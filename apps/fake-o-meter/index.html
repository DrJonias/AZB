<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fake-O-Meter — Playground</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤥</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <a class="back" href="../../">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back
  </a>

  <div class="game-wrap">
    <header class="game-header">
      <div class="icon">🤥</div>
      <h1>Fake-O-Meter</h1>
      <p>Real Trump quote — or completely made up?</p>
    </header>

    <div class="quote-card" id="quoteCard">
      <p class="quote-text" id="quoteText"></p>
    </div>

    <div class="choice-row" id="choiceRow">
      <button class="choice-btn real-btn" id="realBtn">✅ Real</button>
      <button class="choice-btn fake-btn" id="fakeBtn">❌ Fake</button>
    </div>

    <div class="result-area hidden" id="resultArea">
      <p class="verdict" id="verdict"></p>
      <p class="reveal-tag" id="revealTag"></p>
      <p class="source hidden" id="source"></p>
      <button class="next-btn" id="nextBtn">Next quote →</button>
    </div>
  </div>

  <footer data-version style="text-align:center;font-size:13px;color:#9aa7c7;margin:32px 0 16px"></footer>

  <script src="../../js/version.js?v=1"></script>
  <script src="script.js"></script>
</body>
</html>
