<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Draw the Flag — Playground</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">
    <a class="back" href="../../">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back
    </a>

    <header class="page-header">
      <span class="page-icon">🚩</span>
      <h1>Draw the Flag</h1>
      <p class="subtitle">Draw the flag from memory, then reveal to compare.</p>
    </header>

    <div class="country-name" id="countryName"></div>

    <div class="canvas-area">
      <canvas id="drawCanvas" width="400" height="250"></canvas>

      <div class="tools">
        <div class="palette" id="palette"></div>

        <input type="color" id="colorPicker" title="Custom colour">

        <div class="tool-sep"></div>

        <div class="brush-sizes" id="brushSizes"></div>

        <div class="tool-sep"></div>

        <button class="tool-btn" id="eraserBtn">Eraser</button>
        <button class="tool-btn danger" id="clearBtn">✕ Clear</button>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-reveal" id="revealBtn">Reveal Flag</button>
      <button class="btn btn-next" id="nextBtn">Next Country →</button>
    </div>

    <div class="flag-reveal hidden" id="flagReveal">
      <div class="flag-label">The real flag</div>
      <div class="flag-img-wrap">
        <img id="flagImg" src="" alt="">
      </div>
    </div>
  </div>

  <footer>made with ♥ — <a href="../../">Playground</a></footer>

  <script src="script.js"></script>
</body>
</html>
