services:
  zen-garden:
    build: .
    container_name: zen-garden
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      # Persist garden-data.json outside the container so it survives rebuilds.
      # Override ZEN_DATA_DIR to an absolute path OUTSIDE the git checkout if your
      # deploy script ever does `git clean`/`reset --hard` — otherwise it'd wipe this.
      - ${ZEN_DATA_DIR:-./data}:/data
