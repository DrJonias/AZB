version: '3'
services:
  web:
    image: nginx:alpine
    container_name: azb-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  webhook:
    image: alpine/git
    container_name: azb-webhook
    restart: unless-stopped
    volumes:
      - ./site:/site
    entrypoint: >
      sh -c "
        if [ ! -d /site/.git ]; then
          git clone https://github.com/DrJonias/AZB /site;
        fi;
        while true; do
          sleep 60;
          git -C /site pull;
        done
      "

  # Backend für apps/zen-garden. Kein eigenes Image nötig — läuft direkt aus
  # dem git-Checkout, den der webhook-Container ohnehin aktuell hält.
  zen-garden:
    image: node:20-alpine
    container_name: azb-zen-garden
    restart: unless-stopped
    volumes:
      - ./site:/site:ro
      - ./zen-garden-data:/data
    environment:
      - DATA_DIR=/data
    # server.js läuft, bis es crasht oder maximal 5 Minuten vergangen sind,
    # dann startet die Schleife es neu — dadurch übernimmt es automatisch
    # Code-Änderungen, die der webhook-Container reingezogen hat, ohne dass
    # hier ein Docker-Rebuild oder Zugriff auf den Docker-Socket nötig wäre.
    command: >
      sh -c "
        while true; do
          timeout 300 node /site/apps/zen-garden/server/server.js;
          sleep 2;
        done
      "
