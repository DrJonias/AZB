server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # /site ist ein echtes git-Repo (der webhook-Container klont dorthin) —
    # ohne diese Regel liefert nginx .git/config, .git/objects/... öffentlich
    # aus (bekanntes Scan-Ziel für Bots). Blockt jeden Pfad, der mit "." beginnt.
    location ~ /\. {
        deny all;
        return 404;
    }

    # Cloudflare cached JS/CSS sonst 4 Stunden am Edge — nach einem git push
    # würde der Browser so lange alten Code bekommen. "no-cache" heißt:
    # cachen erlaubt, aber vor jeder Auslieferung beim Origin nachfragen
    # (per ETag, kostet fast nichts). Änderungen sind so sofort live.
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Reicht Zen-Garden-API-Aufrufe an den Backend-Container weiter, damit
    # das Spiel unter derselben Adresse (http://nas-ip:8080/...) läuft und
    # niemand die "Server-Adresse" im Spiel manuell eintragen muss.
    location /api/ {
        proxy_pass http://zen-garden:8787/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
