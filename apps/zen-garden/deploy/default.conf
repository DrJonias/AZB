server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Reicht Zen-Garden-API-Aufrufe an den Backend-Container weiter, damit
    # das Spiel unter derselben Adresse (http://nas-ip:8080/...) läuft und
    # niemand die "Server-Adresse" im Spiel manuell eintragen muss.
    location /api/ {
        proxy_pass http://zen-garden:8787/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
