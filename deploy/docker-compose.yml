version: '3'

# Deploy template for the NAS. Folder structure next to this file:
#   ./site              master checkout  (the webhook container creates it itself)
#   ./site-dev          dev checkout      (same)
#   ./backend-data      production data (garden-data.json, scores.json, feedback.jsonl)
#   ./backend-data-dev  dev data
#
# Everything deploys itself: the webhook pulls every minute, the backend
# containers restart their node process at least every 5 minutes, and
# nginx reloads its config (comes straight from the checkout, see below) on
# the same rhythm. This compose file only needs to be touched
# when the container topology itself changes (new service, different
# port) — otherwise a "git push" is enough.
#
# Watch out on the very first "up" on an empty NAS folder: ./site and
# ./site-dev must already exist as (empty) folders, otherwise
# the bind mounts fail (Docker doesn't create missing mount sources itself).
# mkdir -p site site-dev backend-data backend-data-dev before the first start.

services:
  web:
    image: nginx:alpine
    container_name: azb-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      # dev checkout as subfolder /dev in the webroot — this way all
      # location rules (cache headers, dotfile block) apply there automatically too
      - ./site-dev:/usr/share/nginx/html/dev:ro
      # Config comes straight from the master checkout (not from site-dev —
      # the same file serves both environments anyway) and gets pulled in
      # automatically with every webhook pull.
      - ./site/deploy/nginx:/etc/nginx/conf.d:ro
    command: sh -c "while :; do sleep 300; nginx -s reload; done & exec nginx -g 'daemon off;'"

  # Keeps ./site (master) and ./site-dev (dev) up to date via git pull
  webhook:
    image: alpine/git
    container_name: azb-webhook
    restart: unless-stopped
    volumes:
      - ./site:/site
      - ./site-dev:/site-dev
    # After every pull the commit timestamp of HEAD is written to js/build.js
    # (epoch in ms, untracked file) — the footers show it as the site version.
    entrypoint: >
      sh -c "
        git config --global --add safe.directory /site;
        git config --global --add safe.directory /site-dev;
        if [ ! -d /site/.git ]; then
          git clone -b master https://github.com/DrJonias/AZB /site;
        fi;
        if [ ! -d /site-dev/.git ]; then
          git clone -b dev https://github.com/DrJonias/AZB /site-dev;
        fi;
        while true; do
          for d in /site /site-dev; do
            git -C $$d pull || echo pull $$d failed;
            echo $$(git -C $$d log -1 --format=%ct)000 > $$d/js/build.js;
          done;
          sleep 60;
        done
      "

  # Production backend (Zen Garden, highscores, feedback) — runs directly from
  # the git checkout, no own image needed. The node process gets
  # restarted at least every 5 minutes and so automatically picks up
  # code changes from the pull.
  backend:
    image: node:20-alpine
    container_name: azb-backend
    restart: unless-stopped
    volumes:
      - ./site:/site:ro
      - ./backend-data:/data
    environment:
      - DATA_DIR=/data
      # Optional: set a token to read feedback in the browser at
      # https://<domain>/api/feedback?token=<value>
      # - FEEDBACK_TOKEN=some-long-secret
    command: >
      sh -c "
        while true; do
          timeout 300 node /site/server/server.js;
          sleep 2;
        done
      "

  # Separate dev backend with its own data folder — same mechanism,
  # runs from the dev checkout. Reachable via /dev/api/ (nginx proxy).
  backend-dev:
    image: node:20-alpine
    container_name: azb-backend-dev
    restart: unless-stopped
    volumes:
      - ./site-dev:/site:ro
      - ./backend-data-dev:/data
    environment:
      - DATA_DIR=/data
      # Enables the cheat console (in the game: Ctrl+Alt+C or tap the page
      # icon 5× and then enter "token <value>" once).
      # SET ONLY HERE — never on the production backend above! Without the
      # variable /api/cheat is a 404, making the code on master a no-op.
      # - CHEAT_TOKEN=some-long-secret
    command: >
      sh -c "
        while true; do
          timeout 300 node /site/server/server.js;
          sleep 2;
        done
      "
