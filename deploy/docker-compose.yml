version: '3'

# Deploy-Vorlage fürs NAS. Ordnerstruktur neben dieser Datei:
#   ./site          master-Checkout  (legt der webhook-Container selbst an)
#   ./site-dev      dev-Checkout     (dito)
#   ./nginx         default.conf     (einmalig aus deploy/nginx/ kopieren — oder
#                                     Auto-Update-Variante beim web-Service nutzen)
#   ./backend-data      Daten Produktion (garden-data.json, scores.json, feedback.jsonl)
#   ./backend-data-dev  Daten Dev
#
# Code-Änderungen deployen sich selbst: webhook pullt jede Minute, die
# Backend-Container starten ihren node-Prozess spätestens alle 5 Minuten neu.
# Diese Compose-Datei muss nur angefasst werden, wenn sich die Container-
# Topologie selbst ändert (neuer Service, anderer Port).

services:
  web:
    image: nginx:alpine
    container_name: azb-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      # dev-Checkout als Unterordner /dev im Webroot — so greifen alle
      # Location-Regeln (Cache-Header, Dotfile-Block) automatisch auch dort
      - ./site-dev:/usr/share/nginx/html/dev:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # ── Auto-Update-Variante (erst NACH dem Merge von deploy/ nach master!):
      # obige default.conf-Zeile ersetzen durch:
      #   - ./site/deploy/nginx:/etc/nginx/conf.d:ro
      # und zusätzlich unten das command einkommentieren — nginx lädt die
      # Config dann alle 5 Minuten neu, Änderungen kommen per git pull.
    # command: sh -c "while :; do sleep 300; nginx -s reload; done & exec nginx -g 'daemon off;'"

  # Hält ./site (master) und ./site-dev (dev) per git pull aktuell
  webhook:
    image: alpine/git
    container_name: azb-webhook
    restart: unless-stopped
    volumes:
      - ./site:/site
      - ./site-dev:/site-dev
    entrypoint: >
      sh -c "
        if [ ! -d /site/.git ]; then
          git clone -b master https://github.com/DrJonias/AZB /site;
        fi;
        if [ ! -d /site-dev/.git ]; then
          git clone -b dev https://github.com/DrJonias/AZB /site-dev;
        fi;
        while true; do
          sleep 60;
          git -C /site pull || echo 'pull site failed';
          git -C /site-dev pull || echo 'pull site-dev failed';
        done
      "

  # Produktiv-Backend (Zen Garden, Highscores, Feedback) — läuft direkt aus
  # dem git-Checkout, kein eigenes Image nötig. Der node-Prozess wird
  # spätestens alle 5 Minuten neu gestartet und übernimmt so automatisch
  # Code-Änderungen aus dem Pull. Der Pfad-Fallback deckt Checkouts ab,
  # in denen der Server noch unter apps/zen-garden/server/ liegt.
  backend:
    image: node:20-alpine
    container_name: azb-backend
    restart: unless-stopped
    volumes:
      - ./site:/site:ro
      - ./backend-data:/data
    environment:
      - DATA_DIR=/data
      # Optional: Token setzen, um Feedback im Browser zu lesen unter
      # https://<domain>/api/feedback?token=<wert>
      # - FEEDBACK_TOKEN=irgendein-langes-geheimnis
    command: >
      sh -c "
        while true; do
          S=/site/server/server.js;
          [ -f $$S ] || S=/site/apps/zen-garden/server/server.js;
          timeout 300 node $$S;
          sleep 2;
        done
      "

  # Getrenntes Dev-Backend mit eigenem Datenordner — gleiche Mechanik,
  # läuft aus dem dev-Checkout. Erreichbar über /dev/api/ (nginx-Proxy).
  backend-dev:
    image: node:20-alpine
    container_name: azb-backend-dev
    restart: unless-stopped
    volumes:
      - ./site-dev:/site:ro
      - ./backend-data-dev:/data
    environment:
      - DATA_DIR=/data
    command: >
      sh -c "
        while true; do
          S=/site/server/server.js;
          [ -f $$S ] || S=/site/apps/zen-garden/server/server.js;
          timeout 300 node $$S;
          sleep 2;
        done
      "
