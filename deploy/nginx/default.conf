server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /site ist ein echtes git-Repo (der webhook-Container klont dorthin) —
    # ohne diese Regel liefert nginx .git/config, .git/objects/... öffentlich
    # aus (bekanntes Scan-Ziel für Bots). Blockt jeden Pfad, der mit "." beginnt.
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Dev-Umgebung ──────────────────────────────────────────────────────
    # Der dev-Checkout ist als Unterordner /dev in den Webroot gemountet,
    # statische Dateien brauchen daher keine eigene Regel. Nur die API geht
    # an das getrennte Dev-Backend (eigener Container, eigene Daten).
    location /dev/api/ {
        proxy_pass http://backend-dev:8787/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Produktion ────────────────────────────────────────────────────────
    # Reicht API-Aufrufe (Zen Garden, Feedback, Highscores) an den
    # Backend-Container weiter.
    location /api/ {
        proxy_pass http://backend:8787/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cloudflare cached JS/CSS sonst 4 Stunden am Edge — nach einem git push
    # würde der Browser so lange alten Code bekommen. "no-cache" heißt:
    # cachen erlaubt, aber vor jeder Auslieferung beim Origin nachfragen
    # (per ETag, kostet fast nichts). Änderungen sind so sofort live.
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
