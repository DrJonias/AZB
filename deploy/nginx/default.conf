server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /site is a real git repo (the webhook container clones it there) —
    # without this rule nginx would serve .git/config, .git/objects/... publicly
    # (a known scan target for bots). Blocks any path starting with ".".
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Dev environment ─────────────────────────────────────────────────────
    # The dev checkout is mounted as a subfolder /dev in the webroot,
    # so static files don't need their own rule. Only the API goes
    # to the separate dev backend (its own container, its own data).
    location /dev/api/ {
        proxy_pass http://backend-dev:8787/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Production ───────────────────────────────────────────────────────────
    # Forwards API calls (Zen Garden, feedback, highscores) to the
    # backend container.
    location /api/ {
        proxy_pass http://backend:8787/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cloudflare otherwise caches JS/CSS for 4 hours at the edge — after a git push
    # the browser would get old code for that long. "no-cache" means:
    # caching allowed, but check back with the origin before every delivery
    # (via ETag, costs almost nothing). Changes go live immediately this way.
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
